spring:
  application:
    name: ecommerce
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# Database settings live in profile-specific files (e.g., application-dev.yaml)

jwt:
  secret: ${JWT_SECRET:change-me-dev-secret-at-least-32-bytes-long}
  access-exp-seconds: 900 # 15 minutes
  refresh-exp-seconds: 604800 # 7 days
  cookie:
    name: refresh_token
    path: /
    secure: false
    same-site: Lax
    domain: ${JWT_COOKIE_DOMAIN:}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
